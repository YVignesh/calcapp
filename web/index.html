<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="CalcApp is an all-in-one calculator suite with finance, scientific, graphing, unit conversion, health, cooking, home and everyday math tools for web and mobile.">
  <meta name="theme-color" content="#0B0B0E">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="CalcApp - All-in-One Calculator Suite">
  <meta property="og:description" content="Fast calculators for finance, scientific math, graphs, conversions, health, cooking, home projects and everyday math.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CalcApp - All-in-One Calculator Suite">
  <meta name="twitter:description" content="One app for simple to complex calculations, built for desktop, tablet and mobile.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CalcApp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CalcApp - All-in-One Calculator Suite</title>
  <link rel="manifest" href="manifest.json">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CalcApp",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web, Android, iOS",
      "description": "An all-in-one calculator suite for finance, scientific math, graphing, unit conversion, health, cooking, home projects and everyday math.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
</head>
<body>
  <noscript>CalcApp needs JavaScript to run its calculators.</noscript>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
