name: calc
description: "A sleek and comprehensive calculator app."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.2.3
  provider: ^6.1.2
  math_expressions: ^3.1.0
  intl: ^0.20.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
